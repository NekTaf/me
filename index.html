<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NekTaf — Interactive CV</title>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- Iconify -->
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
<!-- Three.js & OrbitControls -->
<script async="" src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
<script type="importmap">
{
"imports": {
"three": "https://unpkg.com/three@0.160.0/build/three.module.js",
"three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}
}
</script>
<!-- Google Fonts: Inter -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
<style>
body { font-family: 'Inter', sans-serif; }
/* Custom Scrollbar for the list */
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
/* Range Slider Styling */
input[type=range] {
-webkit-appearance: none;
background: transparent;
}
input[type=range]::-webkit-slider-thumb {
-webkit-appearance: none;
height: 16px;
width: 16px;
border-radius: 50%;
background: #ffffff;
cursor: pointer;
margin-top: -6px;
box-shadow: 0 0 10px rgba(255,255,255,0.5);
}
input[type=range]::-webkit-slider-runnable-track {
width: 100%;
height: 4px;
cursor: pointer;
background: rgba(255,255,255,0.2);
border-radius: 2px;
}
canvas { outline: none; }

/* Side panel */
#side-panel {
  transition: opacity 0.4s ease, transform 0.4s ease;
}
#side-panel.hidden-panel {
  opacity: 0;
  transform: translateX(24px);
  pointer-events: none;
}
.link-pill {
  transition: background-color 0.2s ease, border-color 0.2s ease;
}
</style>
</head>
<body class="bg-neutral-950 text-neutral-200 overflow-hidden w-screen h-screen relative select-none">

    <!-- Canvas Container -->
    <div id="canvas-container" class="absolute inset-0 z-0"></div>

    <!-- UI Overlay -->
    <div class="absolute inset-0 z-10 pointer-events-none flex flex-col justify-between p-6">

        <!-- Header (icon buttons only) -->
        <!-- <header class="flex justify-end items-start pointer-events-auto">
            <div class="flex gap-2">
                 <button id="toggle-orbit" class="group flex items-center justify-center w-10 h-10 rounded-full bg-neutral-900/50 backdrop-blur-md border border-white/10 text-neutral-400 hover:text-white hover:border-white/20 transition-all duration-300" title="Toggle Orbits">
                    <iconify-icon icon="solar:orbit-linear" width="20" height="20" stroke-width="1.5"></iconify-icon>
                </button>
                <a href="#" class="group flex items-center justify-center w-10 h-10 rounded-full bg-neutral-900/50 backdrop-blur-md border border-white/10 text-neutral-400 hover:text-white hover:border-white/20 transition-all duration-300">
                    <iconify-icon icon="solar:settings-linear" width="20" height="20" stroke-width="1.5"></iconify-icon>
                </a>
            </div>
        </header> -->

        <!-- Combined Identity + Navigation box -->
        <nav class="absolute top-6 left-6 pointer-events-auto hidden md:block">
            <div class="flex flex-col gap-1 bg-neutral-900/40 backdrop-blur-xl border border-white/5 rounded-2xl p-4 w-64 shadow-2xl shadow-black/50">
                <div class="flex items-center gap-2 text-white/90">
                    <div class="w-6 h-6 rounded-full bg-gradient-to-tr from-orange-500 to-yellow-300 shadow-[0_0_15px_rgba(255,165,0,0.5)]"></div>
                    <h1 class="text-lg font-medium tracking-tight">Nektarios Aristeidis Tafanidis</h1>
                </div>
                <p class="text-xs text-neutral-500 font-normal ml-8 mb-1">PhD Student in Space Robotics and Reinforcment Learning</p>

                <div class="border-t border-white/5 mt-1 pt-3">
                    <p class="px-1 pb-2 text-sm font-medium text-neutral-400 uppercase tracking-widest">Navigate</p>
                    <!-- Generated by JS -->
                    <div id="planet-list" class="flex flex-col gap-1"></div>
                </div>
            </div>
        </nav>

        <!-- Bottom Playback Controls -->
        <footer class="hidden flex items-end md:items-center justify-start gap-4 pointer-events-auto w-full">
            <div class="flex items-center gap-4 bg-neutral-900/60 backdrop-blur-xl border border-white/10 rounded-full px-5 py-3 shadow-2xl">
                <button id="play-pause" class="text-white hover:text-indigo-400 transition-colors flex items-center">
                    <iconify-icon id="play-icon" icon="solar:pause-linear" width="24" height="24" stroke-width="1.5"></iconify-icon>
                </button>

                <div class="flex flex-col w-32 md:w-48 gap-1">
                    <div class="flex justify-between text-[10px] text-neutral-400 font-medium tracking-wide">
                        <span>SPEED</span>
                        <span id="speed-val">0.5x</span>
                    </div>
                    <input type="range" id="speed-slider" min="0" max="2" step="0.1" value="0.5" class="w-full h-1 bg-white/20 rounded-lg appearance-none cursor-pointer">
                </div>
            </div>
        </footer>
    </div>

    <!-- Side Panel (shown on click of sun / planet) -->
    <div id="side-panel" class="hidden-panel fixed top-6 bottom-6 right-6 z-20 overflow-y-auto no-scrollbar bg-neutral-900/70 backdrop-blur-xl border border-white/10 rounded-2xl p-8 shadow-2xl shadow-black/50 pointer-events-auto">
        <div id="panel-resize" class="absolute top-0 bottom-0 left-0 w-2 -ml-1 cursor-ew-resize hover:bg-white/20 rounded-l-2xl" title="Drag to resize"></div>
        <div class="flex items-start justify-between mb-3">
            <div>
                <span id="panel-type" class="text-[10px] uppercase tracking-widest text-neutral-500 font-medium">Section</span>
                <div class="flex items-center justify-between mb-3">
                    <h2 id="panel-name" class="text-2xl font-medium text-white tracking-tight">
                        Name
                    </h2>

                    <img
                        id="panel-image"
                        class="hidden w-36 h-36 ml-8 rounded-full object-cover border border-white/20"
                        alt="Profile photo">
                </div>
            </div>
            <button id="panel-close" class="text-neutral-500 hover:text-white transition-colors">
                <iconify-icon icon="solar:close-circle-linear" width="24" height="24"></iconify-icon>
            </button>
        </div>
        <p id="panel-desc" class="text-sm text-neutral-300 leading-relaxed mb-5">
            Description goes here.
        </p>
        <div id="panel-links" class="flex flex-col gap-2">
            <!-- Links injected by JS -->
        </div>
    </div>

    <!-- Script: Three.js Logic -->
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Configuration & Data ---
        const config = {
            sunSize: 3, // Visual scale of sun
            scaleFactor: 1, // Global scale
            orbitScale: 1, // Spacing between orbits
            speedFactor: 0.3, // Animation speed
        };

        // "Sun" now represents the person — click it for the about-me panel
        const sunInfo = {
            name: "Nektarios Aristeidis Tafanidis",
            type: "About Me",
            image: "/images/me.jpeg",
            desc: "My name is Nektarios, and I am currently a PhD candidate at Luleå University of Technology in Sweden, where I conduct research in space autonomy and robotics using reinforcement learning. My work focuses on developing intelligent and safe autonomous systems for future space missions.\n\nI hold an MSc in Autonomous Vehicle Dynamics and Control from Cranfield University and a BEng in Electrical and Electronic Engineering from Newcastle University.\n\n ",            
            links: [
                {
                    label: "Contact me: mail@natafanidis.com",
                    value: "mail@natafanidis.com",
                    icon: "solar:letter-linear",
                    copy: true,
                },
                { label: "GitHub", url: "https://github.com/NekTaf", icon: "solar:code-square-linear" },
                { label: "Google Scholar", url: "https://scholar.google.com/citations?user=k1RqAsAAAAAJ&hl=en", icon: "solar:user-id-linear" },
                { label: "LinkedIn", url: "https://linkedin.com/in/nektarios-aristeidis-tafanidis-051777217", icon: "solar:user-id-linear" },
                { label: "ORCiD", url: "https://orcid.org/my-orcid?orcid=0009-0006-4456-5048", icon: "solar:user-id-linear" },
            ]
        };

        // Only two planets active for now: Publications and Projects.
        // The rest of the original solar system is commented out below —
        // uncomment and fill in real data to add more sections (e.g. Experience, Skills, Education).
        const planetsData = [
            {
                name: "Publications",
                size: 1.4,
                distance: 13,
                speed: 0.01,
                color: 0xFF0000, // bright but desaturated blue
                desc: "A list of selected academic publications.",
                links: [
                    { label: "Advances in Space Research: Reinforcement learning-based station keeping using relative orbital elements", url: "https://doi.org/10.1016/j.asr.2025.04.082" },
                    { label: "International Journal of Control, Automation and Systems: Reinforcement Learning Based Intelligent Control for Low-thrust Tight Station Keeping in Low Earth Orbit", url: "https://doi.org/10.1007/s12555-024-0648-z" },
                    
                ]
            },
            {                   //ring: { inner: 2.4, outer: 3.6, color: 0x82BD9F },

                name: "Projects",
                size: 2,
                distance: 24,
                speed: 0.006,
                color: 0x00FF62
, // bright but desaturated terracotta0x82BD9F
                type: "Work",
                desc: "Selected projects I've built, from side projects to production systems. Replace with your own project list.",
                links: [
                    { label: "OPTACOM — Autonomous and optimized orbit control management for a satellite cluster", url: "https://www.ohb-sweden.se/news-and-media/ohb-sweden-signs-contract-to-work-on-constellation-autonomy/" },
                    { label: "LEO-GYM — A Reinforcement Learning Library for Satellite Control in LEO", url: "https://github.com/NekTaf/leo_gym" },
                    //{ label: "Project Two — short description", url: "#" }
                ]
            },

            {
                name: "Awards",
                size: 2,
                distance: 32,
                speed: 0.004,
                color: 0xEDEDED, // white planet
                type: "Recognition",
                desc: "Awards and honors I've received. Replace with your own list.",
                ring: { inner: 3.0, outer: 4.0, color: 0x6FA8DC }, // blue ring
                links: [
                    { label: "The 2025 Outstanding Paper Award for Young Scientists — COSPAR, 2025", url: "#" },
                    { label: "Best Poster Intelligent Sensing and Communications Group — Newcastle University, 2022", url: "#" },
                    { label: "2nd Place in Marine Autonomy Challenge (MAChallenge), 2022", url: "#" }

                ]
            },

            /* --- Commented out for now: uncomment and fill in to bring back more sections ---
            {
                name: "Experience",
                size: 1.5,
                distance: 31,
                speed: 0.004,
                color: 0xD6A76E,
                type: "Work History",
                desc: "Where I've worked and what I did there.",
                links: [ { label: "Resume (PDF)", url: "#" } ]
            },
            {
                name: "Skills",
                size: 1.2,
                distance: 40,
                speed: 0.003,
                color: 0xF4D03F,
                type: "Skills",
                desc: "Languages, tools, and technologies I work with.",
                links: []
            },
            {
                name: "Education",
                size: 1.0,
                distance: 49,
                speed: 0.002,
                color: 0x7DE3F4,
                type: "Education",
                desc: "Degrees, schools, and coursework.",
                links: []
            },
            */
        ];

        // --- Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        // Dark background — planet visibility comes from lighting/material, not a lighter bg
        scene.background = new THREE.Color('#0d0e12');
        scene.fog = new THREE.FogExp2(0x0d0e12, 0.0022);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 40, 80);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 5;
        controls.maxDistance = 200;
        controls.maxPolarAngle = Math.PI / 1.5; // Don't go below the plane too much

        // --- Lighting ---
        // Moderate ambient light — enough to keep planets visible against the dark background
        const ambientLight = new THREE.AmbientLight(0x808080, 4);
        scene.add(ambientLight);

        // The Sun is the main light source
        const sunLight = new THREE.PointLight(0xffffff, 500, 100);
        sunLight.position.set(0, 0, 0);

        sunLight.castShadow = true;
        sunLight.shadow.bias = -0.0001;

        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 300;

        scene.add(sunLight);

        // --- Objects ---

        // 1. Starfield
        function createStarfield() {
            const geometry = new THREE.BufferGeometry();
            const count = 3000;
            const positions = new Float32Array(count * 3);
            for(let i = 0; i < count * 3; i++) {
                positions[i] = (Math.random() - 0.5) * 600;
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.5,
                transparent: true,
                opacity: 0.8,
                sizeAttenuation: true
            });
            const stars = new THREE.Points(geometry, material);
            scene.add(stars);
        }
        createStarfield();

        // 2. The Sun (= "Me")
        const sunGeometry = new THREE.SphereGeometry(config.sunSize, 64, 64);
        const sunMaterial = new THREE.MeshStandardMaterial({
            color: 0xFDB813,
            emissive: 0xFDB813,
            emissiveIntensity: 1,
            roughness: 0.4
        });
        const sun = new THREE.Mesh(sunGeometry, sunMaterial);
        sun.userData = { isSun: true, ...sunInfo };
        scene.add(sun);

        // Add a glow sprite for the sun
        const spriteMaterial = new THREE.SpriteMaterial({
            map: new THREE.TextureLoader().load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/sprites/glow.png'),
            color: 0xFDB813,
            transparent: true,
            blending: THREE.AdditiveBlending,
            opacity: 0.6
        });
        const sprite = new THREE.Sprite(spriteMaterial);
        sprite.scale.set(15, 15, 1);
        sun.add(sprite);

        // 3. Planets (Publications, Projects)
        const planetMeshes = [];
        const orbitLines = [];
        const planetGroup = new THREE.Group();
        scene.add(planetGroup);

        planetsData.forEach((data, index) => {
            // Orbit Group (rotates around 0,0,0)
            const orbitGroup = new THREE.Group();
            planetGroup.add(orbitGroup);

            // Calculate random starting angle
            orbitGroup.rotation.y = Math.random() * Math.PI * 2;

            // Planet Mesh
            const geometry = new THREE.SphereGeometry(data.size, 32, 32);
            const material = new THREE.MeshStandardMaterial({
                color: data.color,
                emissive: data.color,
                emissiveIntensity: 0.0,
                roughness: 0.35,
                metalness: 0.05,
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.position.x = data.distance; // Offset from center

            orbitGroup.userData = { speed: data.speed, distance: data.distance, name: data.name };
            mesh.userData = { isSun: false, ...data, parentGroup: orbitGroup };

            orbitGroup.add(mesh);
            planetMeshes.push(mesh);

            // Ring (only planets with a `ring` property get one)
            if (data.ring) {
                const ringGeo = new THREE.RingGeometry(data.ring.inner, data.ring.outer, 64);
                const ringMat = new THREE.MeshStandardMaterial({
                    color: data.ring.color,
                    emissive: data.ring.color,
                    emissiveIntensity: 0.0,
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: 0.8,
                    roughness: 0.6
                });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = Math.PI / 2.2;
                mesh.add(ring);
            }

            // Orbit Path Visual (Line)
            const orbitGeo = new THREE.RingGeometry(data.distance - 0.05, data.distance + 0.05, 128);
            const orbitMat = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.06
            });
            const orbitLine = new THREE.Mesh(orbitGeo, orbitMat);
            orbitLine.rotation.x = Math.PI / 2;
            scene.add(orbitLine);
            orbitLines.push(orbitLine);
        });

        // --- Interaction Logic ---

        // UI References
        const planetListEl = document.getElementById('planet-list');
        const sidePanel = document.getElementById('side-panel');
        const panelResizeHandle = document.getElementById('panel-resize');
        const panelName = document.getElementById('panel-name');
        const panelType = document.getElementById('panel-type');
        const panelDesc = document.getElementById('panel-desc');
        const panelImage = document.getElementById('panel-image');
        const panelLinks = document.getElementById('panel-links');
        const panelClose = document.getElementById('panel-close');
        const playPauseBtn = document.getElementById('play-pause');
        const playIcon = document.getElementById('play-icon');
        const speedSlider = document.getElementById('speed-slider');
        //const speedVal = document.getElementById('speed-val');
        const toggleOrbitBtn = document.getElementById('toggle-orbit');

        let isPaused = false;
        let simSpeed = 0.7;
        let targetObject = null; // sun mesh or planet mesh currently focused
        let isFocusing = false;

        // Populate nav list: Sun ("About Me") + planets
        function addNavItem(label, color, onClick) {
            const btn = document.createElement('button');
            btn.className = `group w-full flex items-center justify-between px-3 py-2.5 rounded-lg text-base text-neutral-400 hover:bg-white/5 hover:text-white transition-all duration-200 outline-none`;
            btn.innerHTML = `
                <div class="flex items-center gap-3">
                    <span class="w-2 h-2 rounded-full" style="background-color: ${color}"></span>
                    <span class="font-normal tracking-wide">${label}</span>
                </div>
                <iconify-icon icon="solar:arrow-right-linear" class="opacity-0 group-hover:opacity-100 -translate-x-2 group-hover:translate-x-0 transition-all duration-300" width="18"></iconify-icon>
            `;
            btn.onclick = onClick;
            planetListEl.appendChild(btn);
        }

        addNavItem('About Me', '#FDB813', () => showPanel(sun));
        planetsData.forEach((p, i) => {
            addNavItem(p.name, `#${p.color.toString(16).padStart(6, '0')}`, () => showPanel(planetMeshes[i]));
        });

        function showPanel(mesh) {
            targetObject = mesh;
            const data = mesh.userData;

            if (data.image) {
                panelImage.src = data.image;
                panelImage.classList.remove('hidden');
            } else {
                panelImage.classList.add('hidden');
            }

            panelName.textContent = data.name;
            panelType.textContent = data.type;

            panelDesc.style.whiteSpace = "pre-line";
            panelDesc.textContent = data.desc;

            panelLinks.innerHTML = '';

            (data.links || []).forEach(link => {
                const el = document.createElement(link.copy ? 'button' : 'a');

                if (link.copy) {
                    el.type = 'button';
                    el.onclick = async () => {
                        await navigator.clipboard.writeText(link.value);
                        el.querySelector('span').textContent = 'Copied!';
                        setTimeout(() => {
                            el.querySelector('span').textContent = link.label;
                        }, 1500);
                    };
                } else {
                    el.href = link.url;
                    el.target = '_blank';
                    el.rel = 'noopener noreferrer';
                }

                el.className = 'link-pill flex items-center justify-between px-3 py-2 rounded-lg text-sm text-neutral-300 bg-white/5 border border-white/10 hover:bg-white/10 hover:border-white/20';

                el.innerHTML = `
                    <span>${link.label}</span>
                    <iconify-icon
                        icon="${link.copy ? 'solar:copy-linear' : 'solar:arrow-right-up-linear'}"
                        width="16">
                    </iconify-icon>
                `;

                panelLinks.appendChild(el);
            });
            if (!data.links || data.links.length === 0) {
                const p = document.createElement('p');
                p.className = 'text-xs text-neutral-500';
                p.textContent = 'No links yet.';
                panelLinks.appendChild(p);
            }

            sidePanel.classList.remove('hidden-panel');
            isFocusing = true;
        }

        panelClose.addEventListener('click', () => {
            sidePanel.classList.add('hidden-panel');
            isFocusing = false;
            targetObject = null;
        });

        // Panel sizing — starts at roughly a quarter of the viewport (half the previous size),
        // and can be dragged wider/narrower via the handle on its left edge.
        function setPanelWidth(px) {
            const minW = 260;
            const maxW = window.innerWidth * 0.85;
            sidePanel.style.width = Math.max(minW, Math.min(maxW, px)) + 'px';
        }
        setPanelWidth(window.innerWidth * 0.25);

        let isResizingPanel = false;
        let resizeStartX = 0;
        let resizeStartWidth = 0;

        panelResizeHandle.addEventListener('pointerdown', (e) => {
            isResizingPanel = true;
            resizeStartX = e.clientX;
            resizeStartWidth = sidePanel.getBoundingClientRect().width;
            document.body.style.userSelect = 'none';
            e.preventDefault();
        });
        window.addEventListener('pointermove', (e) => {
            if (!isResizingPanel) return;
            const delta = resizeStartX - e.clientX; // dragging left grows the panel
            setPanelWidth(resizeStartWidth + delta);
        });
        window.addEventListener('pointerup', () => {
            isResizingPanel = false;
            document.body.style.userSelect = '';
        });
        window.addEventListener('resize', () => {
            // keep panel within bounds if the window shrinks
            setPanelWidth(sidePanel.getBoundingClientRect().width);
        });

        // Raycasting: clicking the sun or a planet opens the panel
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();
        const clickableMeshes = [sun, ...planetMeshes];

        window.addEventListener('pointerdown', (event) => {
            if (event.target.closest('#side-panel') || event.target.closest('nav') || event.target.closest('footer') || event.target.closest('header')) {
                return;
            }
            pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
            pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(pointer, camera);

            // Recursively check rings/child meshes too (true), then walk up
            // from whatever was hit to its parent planet/sun mesh, since rings
            // themselves don't have panel data — only the planet/sun does.
            const intersects = raycaster.intersectObjects(clickableMeshes, true);

            if (intersects.length > 0) {
                let hit = intersects[0].object;
                while (hit && !clickableMeshes.includes(hit)) {
                    hit = hit.parent;
                }
                if (hit) showPanel(hit);
            }

        });

        // Controls Logic
        playPauseBtn.addEventListener('click', () => {
            isPaused = !isPaused;
            playIcon.setAttribute('icon', isPaused ? 'solar:play-linear' : 'solar:pause-linear');
        });

        speedSlider.addEventListener('input', (e) => {
            simSpeed = parseFloat(e.target.value);
            speedVal.textContent = simSpeed.toFixed(1) + 'x';
        });

        //toggleOrbitBtn.addEventListener('click', () => {
        //    orbitLines.forEach(line => {
        //        line.visible = !line.visible;
        //    });
        //    toggleOrbitBtn.classList.toggle('bg-white/10');
        //    toggleOrbitBtn.classList.toggle('text-white');
        //});

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            if (!isPaused) {
                const delta = simSpeed * config.speedFactor;

                // Rotate Planets around Sun
                planetMeshes.forEach(mesh => {
                    const group = mesh.userData.parentGroup;
                    group.rotation.y += mesh.userData.speed * delta;

                    // Rotate Planet on Axis
                    mesh.rotation.y += 0.01 * delta;
                });

                // Sun self-rotation
                sun.rotation.y += 0.002 * delta;
            }

            // Camera Following Logic
            if (isFocusing && targetObject) {
                const targetPos = new THREE.Vector3();
                targetObject.getWorldPosition(targetPos);
                const lerpFactor = 0.05;
                controls.target.lerp(targetPos, lerpFactor);
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // Responsive Resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
	showPanel(sun);
    </script>

</body>
</html>
